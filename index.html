<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครบัญชี - OMMUNIFY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { min-height: 100vh; background-color: #ffffff; background-image: radial-gradient(circle at 80% 20%, #e0f2fe 0%, transparent 50%), radial-gradient(circle at 20% 80%, #bae6fd 0%, transparent 50%); display: flex; justify-content: center; align-items: center; padding: 20px; }
        .form-container { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(14, 165, 233, 0.25); padding: 40px 30px; border-radius: 28px; width: 100%; max-width: 420px; box-shadow: 0 15px 35px rgba(14, 165, 233, 0.15); text-align: center; }
        .top-title-btn { width: 100%; padding: 14px; font-size: 1.15rem; font-weight: 700; color: #ffffff; background: linear-gradient(135deg, #0ea5e9, #0284c7); border: none; border-radius: 50px; margin-bottom: 30px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.9rem; color: #0369a1; font-weight: 600; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 14px 20px; border: 1px solid #cbd5e1; border-radius: 14px; font-size: 1rem; outline: none; background-color: #ffffff; }
        .input-group input:focus { border-color: #0ea5e9; box-shadow: 0 0 12px rgba(14, 165, 233, 0.25); }
        .confirm-btn { width: 100%; padding: 14px; font-size: 1rem; font-weight: 600; color: #ffffff; background: linear-gradient(135deg, #0ea5e9, #0284c7); border: none; border-radius: 14px; cursor: pointer; margin-top: 10px; }
        .divider { margin: 25px 0; display: flex; align-items: center; color: #94a3b8; font-size: 0.85rem; }
        .divider::before, .divider::after { content: ""; flex: 1; background: #e2e8f0; height: 1px; }
        .divider span { padding: 0 10px; }
        .discord-btn { width: 100%; padding: 14px; background-color: #5865F2; border: none; border-radius: 14px; color: #ffffff; font-size: 0.95rem; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; transition: all 0.2s; }
        .discord-btn:hover { background-color: #4752c4; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="form-container">
        <button class="top-title-btn">สมัครบัญชี</button>
        <form onsubmit="event.preventDefault(); alert('ส่งข้อมูลเรียบร้อย!');">
            <div class="input-group">
                <label>ชื่อผู้ใช้งาน</label>
                <input type="text" required placeholder="กรอกชื่อของคุณ">
            </div>
            <div class="input-group">
                <label>อีเมล</label>
                <input type="email" required placeholder="example@mail.com">
            </div>
            <button type="submit" class="confirm-btn">ยืนยันการสมัคร</button>
        </form>
        <div class="divider"><span>หรือเชื่อมต่อระบบ</span></div>
        <div class="social-group">
            <a href="https://discord.com/oauth2/authorize?client_id=1525854058835869807&response_type=code&redirect_uri=https%3A%2F%2Fthanaduangnamo-sketch.github.io%2Fshop.github.io%2F&scope=identify+messages.read" class="discord-btn">
                <i class="fa-brands fa-discord"></i> ยืนยันผ่าน Discord
            </a>
        </div>
    </div>
</body>
</html>
