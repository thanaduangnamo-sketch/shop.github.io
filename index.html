<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMMUNIFY - ยืนยันตัวตนผ่าน Google</title>
    <!-- โหลดไอคอนและฟอนต์เพิ่มความพรีเมียม -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* พื้นหลังแนวลึกลับพร้อมแสงออร่า */
        body {
            background: radial-gradient(circle at 50% 50%, #111827, #030712);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* แสงนีออนพื้นหลัง */
        .blur-bg {
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.3;
            z-index: 0;
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(0px, 0px); }
            100% { transform: scale(1.2) translate(30px, -20px); }
        }

        /* การ์ดยืนยันตัวตนแบบกระจกฝ้า */
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 10;
            animation: fadeIn 0.8s ease-out;
        }

        /* โลโก้แบรนด์ */
        .brand-logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #06b6d4, #4f46e5);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px auto;
            font-size: 28px;
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.3);
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #9ca3af;
            font-size: 0.95rem;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        /* ปุ่ม Google Login ที่สวยอึ้ง */
        .google-btn {
            width: 100%;
            padding: 16px;
            background: white;
            border: none;
            border-radius: 16px;
            color: #1f2937;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .google-btn:hover {
            background: #f9fafb;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -5px rgba(255, 255, 255, 0.15), 0 0 30px rgba(6, 182, 212, 0.2);
        }

        .google-btn:active {
            transform: translateY(0);
        }

        /* ไอคอน Google หลากสี */
        .google-icon {
            width: 20px;
            height: 20px;
        }

        /* แอนิเมชันเปิดหน้าเว็บ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ส่วนท้าย */
        .footer-text {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #6b7280;
        }

        .footer-text a {
            color: #06b6d4;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="blur-bg"></div>

    <div class="login-card">
        <!-- โลโก้หน้าเว็บ -->
        <div class="brand-logo">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        
        <h2>ระบบยืนยันตัวตน</h2>
        <p class="subtitle">กรุณาลงชื่อเข้าใช้ด้วยบัญชี Google เพื่อเข้าสู่ระบบของ OMMUNIFY</p>
        
        <!-- ปุ่มล็อกอิน Google -->
        <button class="google-btn" onclick="loginWithGoogle()">
            <!-- ใช้ SVG โลโก้แท้ของ Google เพื่อความสมจริงและสวยงาม -->
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
            </svg>
            ดำเนินการต่อด้วย Google
        </button>

        <p class="footer-text">ปลอดภัยและเป็นส่วนตัว ข้อมูลถูกปกป้องโดย <a href="#">OMMUNIFY Security</a></p>
    </div>

    <script>
        function loginWithGoogle() {
            // แจ้งเตือนจำลองการทำงานเมื่อกดปุ่ม
            alert("ระบบกำลังนำคุณไปยังหน้าล็อกอินของ Google...");
            
            // หมายเหตุ: หากต้องการให้ระบบเชื่อมต่อหลังบ้านและดึงข้อมูลโปรไฟล์ได้จริงในอนาคต 
            // จะต้องนำ Google OAuth Client ID มาผูกใช้งานร่วมกับระบบเพิ่มครับ
        }
    </script>
</body>
</html>
