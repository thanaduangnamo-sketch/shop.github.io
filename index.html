<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMMUNIFY</title>
    <style>
        /* รีเซ็ตค่าเริ่มต้น */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* พื้นหลังสีขาว นุ่มนวลด้วยแสงออร่าสีฟ้าไล่เฉด */
        body {
            background: min-height: 100vh;
            background-color: #ffffff;
            background-image: 
                radial-gradient(circle at 80% 20%, #e0f2fe 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, #bae6fd 0%, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* กล่องคอนเทนเนอร์ตรงกลาง */
        .main-container {
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        /* ปุ่มกดตรงกลางหน้าจอ */
        .center-btn {
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            /* ไล่เฉดสีฟ้าพรีเมียม */
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(14, 165, 233, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
        }

        /* เอฟเฟกต์ตอนเอาเมาส์ไปชี้ที่ปุ่ม */
        .center-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(14, 165, 233, 0.4);
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        }

        /* เอฟเฟกต์ตอนกดปุ่ม */
        .center-btn:active {
            transform: translateY(-1px);
        }

        /* แอนิเมชันเปิดหน้าเว็บ */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- ส่วนเนื้อหาที่มีแค่ปุ่มเดียวตรงกลาง -->
    <div class="main-container">
        <button class="center-btn" onclick="handleClick()">เริ่มต้นใช้งาน</button>
    </div>

    <script>
        // ฟังก์ชันเมื่อคลิกปุ่ม
        function handleClick() {
            alert("ยินดีต้อนรับสู่ OMMUNIFY!");
        }
    </script>
</body>
</html>
