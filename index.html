<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ommunify - ยินดีต้อนรับ</title>
    <style>
        /* รีเซ็ตค่าเริ่มต้นของ Browser */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* ตั้งค่าพื้นหลังเป็นรูปภูเขาแบบเต็มจอ */
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        /* แถบเมนูด้านบน (Navbar) */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(255, 255, 255, 0.1); /* พื้นหลังโปร่งแสง */
            backdrop-filter: blur(10px); /* เอฟเฟกต์กระจกฝ้า */
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #00d2ff; /* เปลี่ยนสีเมื่อเอาเมาส์ไปชี้ */
        }

        /* ส่วนเนื้อหาตรงกลางเว็บ */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100vh;
            padding: 0 20px;
        }

        .container h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            animation: fadeInDown 1s ease;
        }

        .container p {
            font-size: 20px;
            margin-bottom: 30px;
            max-width: 600px;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.7);
            color: #e0e0e0;
            animation: fadeInUp 1s ease;
        }

        /* ปุ่มกดตรงกลาง */
        .btn {
            padding: 12px 30px;
            font-size: 18px;
            color: white;
            background: linear-gradient(45deg, #00b4db, #0083b0);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 180, 219, 0.4);
            transition: 0.3s;
            text-decoration: none;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 180, 219, 0.6);
        }

        /* เอฟเฟกต์อนิเมชันเปิดหน้าเว็บ */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- แถบเมนูด้านบน -->
    <nav class="navbar">
        <div class="logo">OMMUNIFY</div>
        <ul class="nav-links">
            <li><a href="#">หน้าแรก</a></li>
            <li><a href="#">เกี่ยวกับ</a></li>
            <li><a href="#">ผลงาน</a></li>
            <li><a href="#">ติดต่อ</a></li>
        </ul>
    </nav>

    <!-- เนื้อหาตรงกลางเว็บ -->
    <div class="container">
        <h1>ยินดีต้อนรับสู่โลกใบใหม่</h1>
        <p>นี่คือโปรเจกต์เว็บไซต์แรกบน GitHub Pages ที่ดีไซน์ด้วยความเรียบหรูและทรงพลัง</p>
        <a href="#" class="btn">เริ่มต้นใช้งาน</a>
    </div>

</body>
</html>
