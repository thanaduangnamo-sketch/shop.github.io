<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMMUNIFY - Bot Dashboard</title>
    <style>
        /* รีเซ็ตค่าเริ่มต้น */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* พื้นหลังอวกาศ/นีออนเคลื่อนไหว */
        body {
            background: radial-gradient(circle at 50% 50%, #1a103c, #050515);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        /* ตกแต่งแสงนีออนพื้นหลัง */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.4;
        }
        body::before { top: 10%; left: 15%; background: #00f2fe; }
        body::after { bottom: 10%; right: 15%; background: #4facfe; }

        /* การ์ดสไตล์กระจกฝ้า (Glassmorphism) */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dashboard-card {
            max-width: 800px;
            display: none; /* ซ่อนไว้ก่อน ล็อกอินเสร็จค่อยโชว์ */
        }

        /* หัวข้อ */
        h2 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: #8a8aa3;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* ฟอร์มกรอกข้อมูล */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #00f2fe;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }

        /* ปุ่มกดสุดอึ้ง */
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 242, 254, 0.5);
            letter-spacing: 1px;
        }

        /* สลับหน้า สมัคร/ล็อกอิน */
        .switch-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #8a8aa3;
        }

        .switch-text span {
            color: #00f2fe;
            cursor: pointer;
            font-weight: 500;
        }

        .switch-text span:hover {
            text-decoration: underline;
        }

        /* หน้า Dashboard ควบคุมบอท */
        .db-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .status-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .status-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .status-title { color: #8a8aa3; font-size: 0.85rem; margin-bottom: 5px; }
        .status-value { font-size: 1.5rem; font-weight: bold; }
        .status-online { color: #00ff66; text-shadow: 0 0 10px rgba(0, 255, 102, 0.3); }
        .status-offline { color: #ff3366; text-shadow: 0 0 10px rgba(255, 51, 102, 0.3); }

        .console-box {
            background: #05050f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #00ff66;
            height: 150px;
            overflow-y: auto;
            margin-bottom: 20px;
            text-align: left;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #ff3366;
            color: #ff3366;
            padding: 6px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .logout-btn:hover { background: #ff3366; color: white; }

        .run-btn { background: linear-gradient(45deg, #00ff66, #00b347); box-shadow: 0 4px 15px rgba(0, 255, 102, 0.2); }
        .run-btn:hover { box-shadow: 0 6px 25px rgba(0, 255, 102, 0.4); }
        .stop-btn { background: linear-gradient(45deg, #ff3366, #cb0036); box-shadow: 0 4px 15px rgba(255, 51, 102, 0.2); display: none;}
        .stop-btn:hover { box-shadow: 0 6px 25px rgba(255, 51, 102, 0.4); }

    </style>
</head>
<body>

    <!-- 1. การ์ดล็อกอิน / สมัครสมาชิก -->
    <div class="card" id="authCard">
        <h2 id="authTitle">LOGIN</h2>
        <p class="subtitle" id="authSubtitle">กรุณาเข้าสู่ระบบเพื่อจัดการระบบรันบอท</p>
        
        <form id="authForm" onsubmit="handleAuth(event)">
            <div class="input-group" id="emailGroup" style="display: none;">
                <label>Email</label>
                <input type="email" id="email" placeholder="example@mail.com">
            </div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" required placeholder="ชื่อผู้ใช้งาน">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn" id="submitBtn">LOG IN</button>
        </form>

        <p class="switch-text" id="switchText">
            ยังไม่มีบัญชีใช่ไหม? <span onclick="toggleMode()">สมัครสมาชิกที่นี่</span>
        </p>
    </div>

    <!-- 2. การ์ดแดชบอร์ดจัดการบอท (จะแสดงหลังล็อกอินสำเร็จ) -->
    <div class="card dashboard-card" id="dashboardCard">
        <div class="db-header">
            <div>
                <h3 style="color: #00f2fe;">OMMUNIFY DASHBOARD</h3>
                <p style="font-size: 0.8rem; color: #8a8aa3;">ยินดีต้อนรับคุณ, <span id="userDisplay" style="color: white;">User</span></p>
            </div>
            <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
        </div>

        <div class="status-panel">
            <div class="status-box">
                <div class="status-title">สถานะการรันบอท</div>
                <div class="status-value status-offline" id="botStatus">OFFLINE</div>
            </div>
            <div class="status-box">
                <div class="status-title">ความเร็วเซิร์ฟเวอร์ Hosting</div>
                <div class="status-value" style="color: #4facfe;">9.8 ms</div>
            </div>
        </div>

        <div class="input-group">
            <label>Discord Bot Token (โทเคนของบอทคุณ)</label>
            <input type="password" id="botToken" placeholder="MTA4N... ใส่ Token บอทของคุณที่นี่">
        </div>

        <div class="console-box" id="consoleLog">
            [System] ระบบพร้อมทำงาน กรุณาใส่ Token แล้วกดเริ่มระบบรันบอท...
        </div>

        <button class="btn run-btn" id="btnStart" onclick="startBot()">START BOT</button>
        <button class="btn stop-btn" id="btnStop" onclick="stopBot()">STOP BOT</button>
    </div>

    <script>
        let isSignUpMode = false;
        let isBotRunning = false;

        // ฟังก์ชันสลับหน้า ล็อกอิน / สมัครสมาชิก
        function toggleMode() {
            isSignUpMode = !isSignUpMode;
            const authTitle = document.getElementById('authTitle');
            const authSubtitle = document.getElementById('authSubtitle');
            const emailGroup = document.getElementById('emailGroup');
            const submitBtn = document.getElementById('submitBtn');
            const switchText = document.getElementById('switchText');

            if (isSignUpMode) {
                authTitle.innerText = "SIGN UP";
                authSubtitle.innerText = "สร้างบัญชีใหม่เพื่อเข้าใช้งานโฮสติ้งบอท";
                emailGroup.style.display = "block";
                submitBtn.innerText = "CREATE ACCOUNT";
                switchText.innerHTML = 'มีบัญชีอยู่แล้ว? <span onclick="toggleMode()">เข้าสู่ระบบที่นี่</span>';
            } else {
                authTitle.innerText = "LOGIN";
                authSubtitle.innerText = "กรุณาเข้าสู่ระบบเพื่อจัดการระบบรันบอท";
                emailGroup.style.display = "none";
                submitBtn.innerText = "LOG IN";
                switchText.innerHTML = 'ยังไม่มีบัญชีใช่ไหม? <span onclick="toggleMode()">สมัครสมาชิกที่นี่</span>';
            }
        }

        // ฟังก์ชันเมื่อกดปุ่มล็อกอิน / สมัครสมาชิก (จำลองระบบ)
        function handleAuth(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            
            // ซ่อนหน้าล็อกอิน และเปิดหน้าแดชบอร์ด
            document.getElementById('authCard').style.display = "none";
            document.getElementById('dashboardCard').style.display = "block";
            document.getElementById('userDisplay').innerText = username;
        }

        // ฟังก์ชันออกจากระบบ
        function logout() {
            stopBot();
            document.getElementById('dashboardCard').style.display = "none";
            document.getElementById('authCard').style.display = "block";
            document.getElementById('authForm').reset();
        }

        // ฟังก์ชันสั่งรันบอท (จำลองการทำงานบนหน้าเว็บหน้าบ้าน)
        function startBot() {
            const token = document.getElementById('botToken').value;
            if(!token) {
                alert('กรุณากรอก Discord Bot Token ก่อนครับ!');
                return;
            }

            const consoleLog = document.getElementById('consoleLog');
            const botStatus = document.getElementById('botStatus');
            
            consoleLog.innerHTML += "<br>[System] กำลังเชื่อมต่อเข้ากับเซิร์ฟเวอร์ Discord...";
            
            setTimeout(() => {
                botStatus.innerText = "ONLINE";
                botStatus.className = "status-value status-online";
                consoleLog.innerHTML += "<br><span style='color: #00ff66;'>[Success] บอทออนไลน์เรียบร้อยแล้ว! กำลังทำหน้าที่แจกยศ...</span>";
                
                document.getElementById('btnStart').style.display = "none";
                document.getElementById('btnStop').style.display = "block";
            }, 1500);
        }

        // ฟังก์ชันสั่งหยุดบอท
        function stopBot() {
            const consoleLog = document.getElementById('consoleLog');
            const botStatus = document.getElementById('botStatus');
            
            botStatus.innerText = "OFFLINE";
            botStatus.className = "status-value status-offline";
            consoleLog.innerHTML += "<br>[System] สั่งหยุดการทำงานของบอทแล้ว.";
            
            document.getElementById('btnStart').style.display = "block";
            document.getElementById('btnStop').style.display = "none";
        }
    </script>
</body>
</html>
